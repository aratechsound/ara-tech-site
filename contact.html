        :root { --primary-blue: #007bff; --dark-text: #1d1d1f; }
        body { font-family: 'Noto Sans JP', sans-serif; margin: 0; color: var(--dark-text); line-height: 1.8; background-color: #f8f9fa; }

        /* ナビゲーション */
        .navbar { background-color: var(--primary-blue) !important; padding: 10px 0; position: sticky; top: 0; z-index: 1000; }
        .navbar-brand img { height: 40px; width: auto; }
        .nav-link { color: white !important; font-weight: 700; margin-left: 15px; font-size: 0.9rem; }

        /* ページヘッダー */
        .page-header {
            position: relative;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('img/cta-bg.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            align-items: center; color: white; display: flex; height: 407px; overflow: hidden; text-align: left;
        }
        .page-header .container { padding-bottom: 54px; position: relative; z-index: 3; }
        .page-header .eyebrow { color: #a9d5ff; font-size: .78rem; font-weight: 900; letter-spacing: .2em; margin-bottom: .5rem; }
        .page-header h1 { font-size: clamp(2.8rem, 7vw, 5.5rem); font-weight: 900; letter-spacing: .08em; margin: .2rem 0 1rem; }
        .page-header h1.page-title-ja { font-size: clamp(2rem, 5vw, 4.2rem); letter-spacing: .03em; line-height: 1.25; }
        .page-header .lead { font-size: 1.05rem; margin-bottom: 0; max-width: 620px; }
        
        /* 波の装飾 */
        .wave-container { position: relative; width: 100%; line-height: 0; background: transparent; z-index: 5; margin-top: -50px; }
        .wave-container svg { display: block; width: 100%; height: 60px; }
        .wave-fill { fill: #f8f9fa; }

        /* フォームセクション */
        .contact-wrapper { padding: 0 0 80px 0; position: relative; z-index: 10; margin-top: -20px; }
        .contact-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: clamp(25px, 5%, 50px);
        }
        .form-label { font-weight: 700; color: #444; margin-bottom: 8px; font-size: 0.95rem; }
        .form-control, .form-select {
            border: 1px solid #e0e0e0;
            padding: 12px 15px;
            border-radius: 8px;
            transition: 0.3s;
            background-color: #fff;
        }
        .required-badge {
            background: #e63946;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
        }

        /* 送信ボタン */
        .btn-submit {
            background: var(--primary-blue);
            color: white;
            padding: 18px 50px;
            font-weight: 900;
            border-radius: 50px;
            border: none;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 123, 255, 0.3);
            cursor: pointer;
            width: 100%;
            max-width: 400px;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            background: #0056b3;
        }
        .btn-submit:disabled { cursor: wait; opacity: .72; transform: none; }
        .form-error { background: #fff1f2; border: 1px solid #fecdd3; border-radius: 8px; color: #9f1239; display: none; font-size: .9rem; font-weight: 700; margin-bottom: 20px; padding: 12px 14px; }
        .form-error[data-fs-active] { display: block; }
        [data-fs-field][aria-invalid="true"] { border-color: #dc3545; box-shadow: 0 0 0 .2rem rgba(220, 53, 69, .12); }

        .info-box { background: #eef6ff; border-radius: 15px; padding: 30px; height: 100%; }
        .info-item { display: flex; align-items: flex-start; margin-bottom: 25px; }
        .info-item i { color: var(--primary-blue); font-size: 1.4rem; margin-right: 15px; margin-top: 4px; }

        .btn-back { background: #333; color: white; border-radius: 5px; padding: 12px 30px; text-decoration: none; font-weight: bold; transition: 0.3s; display: inline-block; }

        @media (max-width: 991px) {
            .page-header { background-attachment: scroll; padding: 80px 0 60px 0; }
            .info-box { margin-top: 40px; }
            .contact-wrapper { margin-top: 0; }

    <header class="page-header">
        <div class="container">
            <p class="eyebrow">GET IN TOUCH</p>
            <h1 class="page-title-ja"><span class="d-block">お問い合わせ・お見積り</span><span class="d-block fs-6 mt-2">CONTACT</span></h1>
            <p class="lead fw-bold">お問い合わせ・お見積り依頼</p>
        </div>
    </header>
    
    <div class="wave-container">
        <svg viewBox="0 0 500 150" preserveAspectRatio="none"><path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,150.00 L0.00,150.00 Z" class="wave-fill"></path></svg>
    </div>

    <main class="contact-wrapper container">
        <div class="row justify-content-center">
            <div class="col-lg-11">
                <div class="contact-card">
                    <div class="row">
                        <div class="col-lg-7 px-md-4">
                            <h2 class="fw-bold mb-4" style="border-left: 5px solid var(--primary-blue); padding-left: 15px;">お問い合わせフォーム</h2>
                            
                            <div class="form-error" data-fs-error role="alert"></div>
                            <form id="contact-form" action="https://formspree.io/f/mojqjwnr" method="POST" accept-charset="UTF-8">
                                <div class="mb-4">
                                    <label for="inquiry-type" class="form-label">お問い合わせの種類<span class="required-badge">必須</span></label>
                                    <select id="inquiry-type" name="種類" class="form-select" data-fs-field required>
                                        <option value="" selected disabled>選択してください</option>
                                        <option value="PAレンタル">PAレンタル・イベント音響</option>
                                        <option value="学園祭パック">学園祭パック（PA・照明・ステージ）</option>
                                        <option value="ステージ制作">ステージ制作・大道具</option>
                                        <option value="ツアーPA">ツアー・ライブPA派遣</option>
                                        <option value="設備導入">店舗設備（音響・照明）導入・保守</option>
                                        <option value="その他">その他</option>
                                    </select>
                                </div>
                                <div class="mb-4">
                                    <label for="name" class="form-label">お名前 / 貴社名<span class="required-badge">必須</span></label>
                                    <input id="name" type="text" name="お名前" class="form-control" autocomplete="name" placeholder="例：山田 太郎 / 株式会社◯◯制作" data-fs-field required>
                                </div>
                                <div class="mb-4">
                                    <label for="email" class="form-label">メールアドレス<span class="required-badge">必須</span></label>
                                    <input id="email" type="email" name="email" class="form-control" autocomplete="email" placeholder="example@mail.com" data-fs-field required>
                                </div>
                                <div class="mb-4">
                                    <label for="tel" class="form-label">電話番号</label>
                                    <input id="tel" type="tel" name="電話番号" class="form-control" autocomplete="tel" placeholder="080-1234-5678" data-fs-field>
                                </div>
                                <div class="mb-4">
                                    <label for="message" class="form-label">ご相談内容<span class="required-badge">必須</span></label>
                                    <textarea id="message" name="メッセージ" class="form-control" rows="6" placeholder="開催日時、場所、予定人数、ご予算など、わかる範囲でご記入ください。" data-fs-field required></textarea>
                                </div>
                                <div class="text-center mt-5">
                                    <button type="submit" class="btn-submit shadow" data-fs-submit-btn>内容を送信する</button>
                                </div>
                            </form>
                        </div>

                        <div class="col-lg-5 px-md-4">
                            <div class="info-box">
                                <h2 class="fw-bold mb-4">ご案内</h2>
                                <div class="info-item">
                                    <i class="fas fa-clock"></i>
                                    <div>
                                        <p class="fw-bold">営業時間</p>
                                        <p class="small text-muted">10:00 - 19:00 (不定休)</p>
                                    </div>
                                </div>
                                <div class="info-item">
                                    <i class="fas fa-envelope-open-text"></i>
                                    <div>
                                        <p class="fw-bold">返信について</p>
                                        <p class="small text-muted">通常1〜2営業日以内にご連絡いたします。</p>
                                    </div>
                                </div>
                                <div class="info-item">
                                    <i class="fas fa-map-marker-alt"></i>
                                    <div>
                                        <p class="fw-bold">対応エリア</p>
                                        <p class="small text-muted">広島県内を中心に、全国各地へ対応可能です。</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-5 mb-5">
            <a href="./" class="btn-back"><i class="fas fa-arrow-left me-2"></i>トップページへ戻る</a>
        </div>
