<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#007bff">
    <title>お問い合わせありがとうございました | ARA-TECH</title>
    <link rel="icon" href="img/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-K8VZM111TY"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-K8VZM111TY');
    </script>
    <style>
        :root { --primary: #007bff; --ink: #1d1d1f; --surface: #f5f8fc; }
        body { background: var(--surface); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; line-height: 1.7; }
        .navbar { background: var(--primary) !important; padding: 10px 0; }
        .navbar-brand img { height: 40px; width: auto; }
        .nav-link { color: white !important; font-size: .88rem; font-weight: 700; margin-left: 14px; }
        .thanks-shell { align-items: center; display: flex; min-height: calc(100vh - 152px); padding: 64px 0; }
        .thanks-card { background: white; border-radius: 24px; box-shadow: 0 18px 48px rgba(17, 54, 88, .12); margin: 0 auto; max-width: 760px; padding: clamp(34px, 7vw, 72px); text-align: center; }
        .checkmark { align-items: center; background: #e8f5ee; border-radius: 50%; color: #16864a; display: inline-flex; font-size: 2.1rem; height: 76px; justify-content: center; margin-bottom: 24px; width: 76px; }
        h1 { font-size: clamp(1.8rem, 4vw, 2.7rem); font-weight: 900; letter-spacing: .03em; margin-bottom: 18px; }
        .lead { color: #4c6073; font-size: 1rem; margin: 0 auto; max-width: 590px; }
        .note { background: #eef6ff; border-radius: 14px; color: #36536d; font-size: .92rem; margin: 30px 0; padding: 18px; }
        .btn-primary { border-radius: 999px; font-weight: 900; padding: 13px 26px; }
        footer { background: white; color: #65717c; }
        @media (max-width: 991px) { .nav-link { margin-left: 0; padding: 12px 0; } }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="./"><img src="img/ARA-TECH ロゴ横 白.png" alt="ARA-TECH"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="メニューを開く"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav" aria-label="メインメニュー">
                <div class="navbar-nav ms-auto text-center">
                    <a class="nav-link" href="./">HOME</a>
                    <a class="nav-link" href="pa-rental.html">PA RENTAL</a>
                    <a class="nav-link" href="stage-production.html">STAGE</a>
                    <a class="nav-link" href="tour-pa.html">TOUR PA</a>
                    <a class="nav-link" href="installation.html">INSTALLATION</a>
                    <a class="nav-link" href="works.html">WORKS</a>
                    <a class="nav-link" href="contact.html">CONTACT</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="thanks-shell container">
        <section class="thanks-card" aria-labelledby="thanks-title">
            <div class="checkmark" aria-hidden="true">✓</div>
            <h1 id="thanks-title">お問い合わせを受け付けました</h1>
            <p class="lead">ご連絡ありがとうございます。内容を確認のうえ、ARA-TECHよりご連絡いたします。</p>
            <p id="receipt-number" class="note" hidden></p>
            <p id="pa-receipt-status" class="note" hidden></p>
            <p class="note">お急ぎの場合や内容の追加がある場合は、あらためてお問い合わせフォームからお送りください。</p>
            <a class="btn btn-primary" href="./">トップページへ戻る</a>
        </section>
    </main>

    <footer class="py-4 border-top text-center"><small>&copy; 2025 ARA-TECH. All Rights Reserved. <span aria-hidden="true">|</span> <a href="privacy.html">プライバシーポリシー</a></small></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const parameters = new URLSearchParams(window.location.search);
        if (parameters.get('sent') === '1') {
            const formName = parameters.get('form') === 'pa-inquiry' ? 'pa-inquiry' : 'contact';
            const receipt = parameters.get('receipt') || '';
            if (formName === 'pa-inquiry' && /^PA-\d{8}-\d{5}$/.test(receipt)) {
                const receiptElement = document.getElementById('receipt-number');
                receiptElement.textContent = `問い合わせ番号：${receipt}`;
                receiptElement.hidden = false;
                const mailElement = document.getElementById('pa-receipt-status');
                mailElement.textContent = parameters.get('mail') === 'sent'
                    ? '入力されたメールアドレスへ受付確認メールを送信しました。これは予約確定通知ではありません。内容確認後、ARA-TECHより改めてご連絡します。'
                    : 'お問い合わせは正常に登録されました。受付確認メールを送信できていない場合も、内容確認後にARA-TECHより改めてご連絡します。これは予約確定通知ではありません。';
                mailElement.hidden = false;
            }
            gtag('event', 'generate_lead', { form_name: formName });
            window.history.replaceState({}, document.title, 'thanks.html');
        }
    </script>
</body>
</html>
